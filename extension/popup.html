<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e17;
      color: #f1f5f9;
      padding: 0;
      overflow: hidden;
    }

    .popup {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .popup__header {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(34, 197, 94, 0.08));
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      padding: 20px;
      text-align: center;
    }

    .popup__logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.3);
    }

    .popup__logo svg {
      color: white;
    }

    .popup__title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f1f5f9, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .popup__subtitle {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .popup__body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .popup__desc {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
      text-align: center;
    }

    .popup__btn {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
    }

    .popup__btn:hover {
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
      transform: translateY(-1px);
    }

    .popup__btn:active {
      transform: translateY(0);
    }

    .popup__btn--analyzing {
      opacity: 0.8;
      cursor: not-allowed;
    }

    .popup__btn svg {
      flex-shrink: 0;
    }

    .popup__spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .popup__features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .popup__feature {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #64748b;
      padding: 6px 8px;
      background: rgba(26, 31, 46, 0.6);
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    .popup__feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .popup__feature-dot--green { background: #22c55e; }
    .popup__feature-dot--yellow { background: #eab308; }
    .popup__feature-dot--red { background: #ef4444; }
    .popup__feature-dot--blue { background: #6366f1; }

    .popup__footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(148, 163, 184, 0.08);
      text-align: center;
    }

    .popup__version {
      font-size: 10px;
      color: #475569;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="popup">
    <div class="popup__header">
      <div class="popup__logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4" />
          <path d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18z" />
        </svg>
      </div>
      <h1 class="popup__title">Hallucination Audit Trail</h1>
      <p class="popup__subtitle">AI-Powered Fact Verification</p>
    </div>

    <div class="popup__body">
      <p class="popup__desc">
        Analyze the current page to identify and classify claims as verified, unverified, or hallucinated.
      </p>

      <button class="popup__btn" id="analyze-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
        Analyze This Page
      </button>

      <div class="popup__features">
        <div class="popup__feature">
          <span class="popup__feature-dot popup__feature-dot--green"></span>
          Verified Claims
        </div>
        <div class="popup__feature">
          <span class="popup__feature-dot popup__feature-dot--yellow"></span>
          Unverified Claims
        </div>
        <div class="popup__feature">
          <span class="popup__feature-dot popup__feature-dot--red"></span>
          Hallucinations
        </div>
        <div class="popup__feature">
          <span class="popup__feature-dot popup__feature-dot--blue"></span>
          PDF Support
        </div>
      </div>
    </div>

    <div class="popup__footer">
      <span class="popup__version">v1.0.0 · Demo Mode</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
